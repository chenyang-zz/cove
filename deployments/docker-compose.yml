services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cove
      POSTGRES_PASSWORD: cove
      POSTGRES_DB: cove
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  neo4j:
    image: neo4j:5.26
    environment:
      NEO4J_AUTH: neo4j/coveneo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    image: cove-api:latest
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        CMD_TARGET: api
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
    depends_on:
      - postgres
      - redis
      - elasticsearch
      - neo4j
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  worker:
    image: cove-worker:latest
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        CMD_TARGET: worker
    environment:
      - APP_ENV=production
    depends_on:
      - postgres
      - redis
      - elasticsearch
      - neo4j
    restart: unless-stopped
    healthcheck:
      test: "echo ok"
      interval: 60s
      timeout: 3s
      retries: 1
      start_period: 10s

  gateway:
    profiles: ["gateway"]
    image: cove-gateway:latest
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        CMD_TARGET: gateway
    ports:
      - "8010:8010"
    environment:
      - APP_ENV=production
      - GATEWAY_ENABLED=true
    depends_on:
      - postgres
      - redis
      - elasticsearch
      - neo4j
      - worker
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8010/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  pg_data:
  es_data:
  neo4j_data:
  redis_data:
