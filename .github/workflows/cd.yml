name: CD

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ------------------------------------------------------------------ #
  # 阶段 1: 复用 CI 的质量门禁
  # ------------------------------------------------------------------ #
  ci-gate:
    name: CI Quality Gate
    uses: ./.github/workflows/ci.yml

  # ------------------------------------------------------------------ #
  # 阶段 2: 构建并推送 Docker 镜像到 GHCR
  # ------------------------------------------------------------------ #
  build-and-push:
    name: Build & Push Image
    needs: ci-gate
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-uri: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ------------------------------------------------------------------ #
  # 阶段 3: 触发服务器自动部署
  # ------------------------------------------------------------------ #
  deploy:
    name: Deploy to Server
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            echo "🚀 开始部署镜像: ${{ needs.build-and-push.outputs.image-uri }}"

            # 登录 GHCR
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

            # 拉取最新镜像
            cd ${{ secrets.DEPLOY_COMPOSE_DIR || '/opt/cove' }}
            docker compose -f deployments/docker-compose.yml pull api

            # 滚动更新 api 容器
            docker compose -f deployments/docker-compose.yml up -d --no-deps api

            # 清理悬空镜像
            docker image prune -f

            echo "✅ 部署完成"
            docker compose -f deployments/docker-compose.yml ps api
