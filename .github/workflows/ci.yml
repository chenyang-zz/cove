name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: go vet
        run: go vet ./...

      - name: gofmt check
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "以下文件需要 gofmt 格式化："
            echo "$files"
            exit 1
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run tests
        run: go test ./... -count=1

  codegen-check:
    name: Codegen Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Check route handlers
        run: go run ./cmd/codegen route --check --format json

      - name: Check repositories
        run: go run ./cmd/codegen repository --list-models --format json

      - name: Check OpenAPI docs
        run: go run ./cmd/codegen docs --check --format json
