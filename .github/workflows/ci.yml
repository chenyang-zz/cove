name: CI

on:
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  # 计算本次变更的 .go 文件所在目录，供下游 job 增量检查使用
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      go-dirs: ${{ steps.changed.outputs.dirs }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Determine changed packages
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="HEAD~1"
          fi

          changed_files=$(git diff --name-only "${BASE}...HEAD" -- '*.go')
          if [ -z "$changed_files" ]; then
            echo "dirs=" >> "$GITHUB_OUTPUT"
            echo "无 .go 文件变更，增量检查将跳过"
          else
            changed_dirs=$(echo "$changed_files" | xargs -I{} dirname {} | sort -u | tr '\n' ' ')
            echo "dirs=${changed_dirs}" >> "$GITHUB_OUTPUT"
            echo "变更包: ${changed_dirs}"
          fi

  lint:
    name: Lint
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Go module cache
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: go vet (增量)
        if: needs.prepare.outputs.go-dirs != ''
        run: go vet ${{ needs.prepare.outputs.go-dirs }}

      - name: gofmt check (全量)
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "以下文件需要 gofmt 格式化："
            echo "$files"
            exit 1
          fi

  build:
    name: Build
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Go module cache
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build all commands
        run: go build ./...

  test:
    name: Test
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Go module cache
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run tests (增量)
        if: needs.prepare.outputs.go-dirs != ''
        run: go test -count=1 -race ${{ needs.prepare.outputs.go-dirs }}

  security:
    name: Security
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Go module cache
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run govulncheck (增量)
        if: needs.prepare.outputs.go-dirs != ''
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ${{ needs.prepare.outputs.go-dirs }}

  codegen-check:
    name: Codegen Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Go module cache
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Check route handlers
        run: go run ./cmd/codegen route --check --format json

      - name: Check repositories
        run: go run ./cmd/codegen repository --list-models --format json

      - name: Check OpenAPI docs
        run: go run ./cmd/codegen docs --check --format json

      - name: Check prompts
        run: go run ./cmd/codegen prompt --check --format json

      - name: Run doctor
        run: go run ./cmd/codegen doctor --format json
