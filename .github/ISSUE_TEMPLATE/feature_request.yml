name: 功能请求
description: 为项目提出新想法或改进建议
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你分享想法！请描述你希望看到的功能或改进。

  - type: textarea
    id: problem
    attributes:
      label: 问题 / 需求
      description: 你想解决什么问题？当前有什么痛点？
      placeholder: 描述你遇到的问题或需求
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: 你希望如何实现？有没有具体想法？
      placeholder: 描述你设想的解决方案
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过哪些替代方案？

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 其他有助于理解该请求的上下文、截图或参考资料
