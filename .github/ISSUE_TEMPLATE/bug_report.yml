name: Bug 报告
description: 报告一个 bug 以帮助我们改进
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间填写这份 Bug 报告！请尽量提供完整信息以便我们复现。

  - type: textarea
    id: what-happened
    attributes:
      label: 问题描述
      description: 发生了什么？你期望发生什么？
      placeholder: 描述你遇到的问题
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 如何复现这个问题？
      placeholder: |
        1. 执行 '...'
        2. 调用 '...'
        3. 看到错误
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 相关日志
      description: 请粘贴相关错误日志或堆栈跟踪（如有）
      render: shell

  - type: input
    id: go-version
    attributes:
      label: Go 版本
      description: 你使用的 Go 版本
      placeholder: "1.25"

  - type: input
    id: os
    attributes:
      label: 操作系统
      description: 你使用的操作系统
      placeholder: "macOS 14 / Ubuntu 22.04"

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 其他有助于定位问题的上下文
