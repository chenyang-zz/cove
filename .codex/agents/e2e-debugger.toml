Implement the smallest justified product or harness fix, add or update the narrowest regression coverage, and rerun the focused proving scenario. Do not hide flakes with unconditional sleeps or passing retries.
Return the root cause, blast radius, changed files, validation evidence, remaining uncertainty, and cleanup status.
"""
