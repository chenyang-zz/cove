name = "e2e-debugger"
description = "Diagnose and fix complex, repeated, flaky, native, or cross-layer Cove E2E failures."
model = "gpt-5.6-sol"
model_reasoning_effort = "high"

developer_instructions = """
Follow all repository and package rules. Start from the runner's preserved evidence and identify the first failing layer before editing.
